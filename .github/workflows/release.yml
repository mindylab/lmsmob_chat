name: Publish Android Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Build APK and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Read app version
        id: version
        shell: bash
        run: |
          version_name="$(grep -m1 'versionName' app/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')"
          version_code="$(grep -m1 'versionCode' app/build.gradle.kts | sed -E 's/.*= *([0-9]+).*/\1/')"
          if [[ -z "$version_name" || -z "$version_code" ]]; then
            echo "Could not read versionName/versionCode from app/build.gradle.kts" >&2
            exit 1
          fi
          {
            echo "version_name=$version_name"
            echo "version_code=$version_code"
            echo "tag=v$version_name"
            echo "apk_name=lmsmob-chat-v$version_name.apk"
          } >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Prepare release files
        shell: bash
        run: |
          apk_name="${{ steps.version.outputs.apk_name }}"
          cp app/build/outputs/apk/debug/app-debug.apk "$apk_name"
          cat > release-notes.md <<'NOTES'
          LMSMOB Chat is an Android client for LM Studio local models.

          Highlights:
          - Background notifications can tell you when a chat response finishes.
          - Long-press send can read the next answer once without changing global auto-read.
          - TTS playback can resume from the next unfinished chunk.
          - TTS chunk preparation and playback recover from small transient failures.
          - Shorter TTS watchdog timeouts reduce waiting on stalled synthesis.
          - Tested with the MindyLab LM Studio tools repository.

          Demo: https://youtu.be/mtZJ2uDz3hY

          Note: this APK is a debug-signed build generated by GitHub Actions. Android may ask you to uninstall an older build first if it was signed with a different key.
          NOTES

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          APK_NAME: ${{ steps.version.outputs.apk_name }}
        run: |
          title="LMSMOB Chat v${VERSION_NAME}"
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$APK_NAME" --clobber
          else
            gh release create "$TAG_NAME" "$APK_NAME" \
              --title "$title" \
              --notes-file release-notes.md \
              --target "${{ github.sha }}"
          fi
