<svg xmlns="http://www.w3.org/2000/svg" width="780" height="1180" viewBox="0 0 780 1180" role="img" aria-labelledby="title desc">
  <title id="title">LMSMOB Chat Android chat screen</title>
  <desc id="desc">A product screenshot-style mockup of the LMSMOB Chat conversation UI connected to LM Studio.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eef5ff"/>
      <stop offset="1" stop-color="#f7f3ff"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#156dff"/>
      <stop offset="1" stop-color="#8c4dff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#071026" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="780" height="1180" fill="url(#bg)"/>
  <rect x="160" y="56" width="460" height="1068" rx="54" fill="#071026" filter="url(#shadow)"/>
  <rect x="178" y="74" width="424" height="1032" rx="42" fill="#f4f7ff"/>
  <rect x="318" y="88" width="144" height="16" rx="8" fill="#071026" opacity="0.9"/>
  <rect x="178" y="74" width="424" height="96" rx="42" fill="#ffffff"/>
  <rect x="208" y="126" width="24" height="3" rx="1.5" fill="#071026"/>
  <rect x="208" y="136" width="24" height="3" rx="1.5" fill="#071026"/>
  <rect x="208" y="146" width="24" height="3" rx="1.5" fill="#071026"/>
  <text x="390" y="123" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="700" fill="#071026">LMSMOB Chat</text>
  <text x="390" y="148" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#506078">qwen3-4b - tools</text>
  <circle cx="552" cy="136" r="15" fill="#e8eeff"/>
  <path d="M552 127v18M543 136h18" stroke="#156dff" stroke-width="3" stroke-linecap="round"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(210 210)">
      <rect width="232" height="70" rx="23" fill="#d9e6ff"/>
      <text x="18" y="31" font-size="16" fill="#071026">Give me a launch checklist</text>
      <text x="18" y="53" font-size="16" fill="#071026">for an Android LM Studio app.</text>
    </g>
    <g transform="translate(210 330)">
      <circle cx="18" cy="18" r="18" fill="url(#primary)"/>
      <text x="18" y="24" text-anchor="middle" font-size="15" font-weight="800" fill="#ffffff">M</text>
      <text x="52" y="16" font-size="13" font-weight="700" fill="#506078">LM Studio</text>
      <text x="52" y="46" font-size="16" fill="#071026">1. Start LM Studio server on your PC.</text>
      <text x="52" y="73" font-size="16" fill="#071026">2. Use your LAN IP on Android.</text>
      <text x="52" y="100" font-size="16" fill="#071026">3. Refresh models and start chatting.</text>
      <rect x="52" y="126" width="246" height="46" rx="14" fill="#ffffff" stroke="#d8e0f2"/>
      <text x="68" y="154" font-size="14" fill="#156dff">Tools used: web_search, web_fetch</text>
    </g>
    <g transform="translate(310 582)">
      <rect width="252" height="84" rx="23" fill="#d9e6ff"/>
      <text x="18" y="32" font-size="16" fill="#071026">Can it use MCP tools?</text>
      <text x="18" y="58" font-size="14" fill="#506078">Attached image: settings.png</text>
    </g>
    <g transform="translate(210 720)">
      <circle cx="18" cy="18" r="18" fill="url(#primary)"/>
      <text x="18" y="24" text-anchor="middle" font-size="15" font-weight="800" fill="#ffffff">M</text>
      <text x="52" y="16" font-size="13" font-weight="700" fill="#506078">LM Studio</text>
      <text x="52" y="46" font-size="16" fill="#071026">Yes. Enable Server tools, add an</text>
      <text x="52" y="73" font-size="16" fill="#071026">integration like mcp/local-web, then</text>
      <text x="52" y="100" font-size="16" fill="#071026">limit allowed tools per chat.</text>
    </g>
  </g>
  <rect x="198" y="1010" width="384" height="74" rx="28" fill="#ffffff" stroke="#d8e0f2"/>
  <text x="232" y="1055" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" fill="#506078">Message LM Studio</text>
  <circle cx="540" cy="1047" r="25" fill="url(#primary)"/>
  <path d="M532 1047h16M548 1047l-7-7M548 1047l-7 7" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
