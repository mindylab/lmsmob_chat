<svg xmlns="http://www.w3.org/2000/svg" width="780" height="1180" viewBox="0 0 780 1180" role="img" aria-labelledby="title desc">
  <title id="title">LMSMOB Chat Android settings screen</title>
  <desc id="desc">A product screenshot-style mockup of LMSMOB Chat connection settings for LM Studio and server tools.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f6fbff"/>
      <stop offset="1" stop-color="#f3f0ff"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#156dff"/>
      <stop offset="1" stop-color="#8c4dff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#071026" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="780" height="1180" fill="url(#bg)"/>
  <rect x="160" y="56" width="460" height="1068" rx="54" fill="#071026" filter="url(#shadow)"/>
  <rect x="178" y="74" width="424" height="1032" rx="42" fill="#f4f7ff"/>
  <rect x="318" y="88" width="144" height="16" rx="8" fill="#071026" opacity="0.9"/>
  <rect x="178" y="225" width="424" height="881" rx="36" fill="#ffffff"/>
  <rect x="318" y="244" width="144" height="5" rx="2.5" fill="#d8e0f2"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="216" y="303" font-size="25" font-weight="800" fill="#071026">Connection</text>
    <rect x="216" y="332" width="348" height="70" rx="16" fill="#ffffff" stroke="#c7d2e8"/>
    <text x="234" y="359" font-size="13" fill="#506078">LM Studio API URL</text>
    <text x="234" y="384" font-size="16" fill="#071026">http://10.0.2.2:1234/v1</text>
    <rect x="216" y="424" width="348" height="70" rx="16" fill="#ffffff" stroke="#c7d2e8"/>
    <text x="234" y="451" font-size="13" fill="#506078">API token</text>
    <text x="234" y="476" font-size="16" fill="#071026">sk-lm-************</text>
    <rect x="216" y="516" width="284" height="70" rx="16" fill="#ffffff" stroke="#c7d2e8"/>
    <text x="234" y="543" font-size="13" fill="#506078">Model</text>
    <text x="234" y="568" font-size="16" fill="#071026">qwen3-4b</text>
    <circle cx="536" cy="551" r="27" fill="#e8eeff"/>
    <path d="M528 552a9 9 0 0 0 15 6M544 550a9 9 0 0 0-15-6" fill="none" stroke="#156dff" stroke-width="3" stroke-linecap="round"/>
    <rect x="216" y="606" width="112" height="36" rx="18" fill="#e8eeff"/>
    <text x="272" y="629" text-anchor="middle" font-size="14" fill="#156dff">qwen3-4b</text>
    <rect x="338" y="606" width="154" height="36" rx="18" fill="#ffffff" stroke="#d8e0f2"/>
    <text x="415" y="629" text-anchor="middle" font-size="14" fill="#506078">gemma-3-4b-it</text>
    <line x1="216" y1="677" x2="564" y2="677" stroke="#e0e7f5"/>
    <text x="216" y="726" font-size="21" font-weight="800" fill="#071026">Server tools</text>
    <text x="216" y="754" font-size="14" fill="#506078">Use LM Studio MCP/plugins through /api/v1/chat.</text>
    <rect x="492" y="712" width="72" height="38" rx="19" fill="url(#primary)"/>
    <circle cx="545" cy="731" r="15" fill="#ffffff"/>
    <rect x="216" y="786" width="348" height="96" rx="16" fill="#ffffff" stroke="#c7d2e8"/>
    <text x="234" y="813" font-size="13" fill="#506078">Integrations</text>
    <text x="234" y="840" font-size="16" fill="#071026">mcp/local-web</text>
    <text x="234" y="866" font-size="16" fill="#071026">mcp/playwright</text>
    <rect x="216" y="904" width="348" height="88" rx="16" fill="#ffffff" stroke="#c7d2e8"/>
    <text x="234" y="931" font-size="13" fill="#506078">Allowed tools</text>
    <text x="234" y="958" font-size="16" fill="#071026">web_search</text>
    <text x="234" y="982" font-size="16" fill="#071026">web_fetch</text>
    <rect x="216" y="1020" width="348" height="58" rx="18" fill="url(#primary)"/>
    <text x="390" y="1056" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">Done</text>
  </g>
</svg>
